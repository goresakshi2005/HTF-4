name: release-orchestrator

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Branch or tag to release"
        required: true
        default: "main"

permissions:
  contents: read
  deployments: write

jobs:
  policy-gate:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.gate.outputs.approved }}
    steps:
      - name: Governance policy check
        id: gate
        env:
          REQUIRE_APPROVAL_FOR_RELEASE: ${{ vars.REQUIRE_APPROVAL_FOR_RELEASE || 'true' }}
        run: |
          if [ "${REQUIRE_APPROVAL_FOR_RELEASE}" = "true" ]; then
            echo "approved=false" >> "$GITHUB_OUTPUT"
            echo "Manual approval is required by policy."
          else
            echo "approved=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [policy-gate]
    if: ${{ needs.policy-gate.outputs.approved == 'true' }}
    steps:
      - name: Deploy placeholder
        run: echo "Deploying ${{ github.event.inputs.release_ref }}"

